name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bash tmux fzf jq

      - name: Build Go binaries
        run: |
          go build -o bin/am-list-internal ./cmd/am-list-internal/
          go build -o bin/am-browse ./cmd/am-browse/

      - name: Bash syntax check
        run: |
          bash -n am lib/*.sh bin/* scripts/*.sh tests/test_all.sh

      - name: Check docs in sync
        run: ./scripts/check-docs.sh

      - name: Run test suite
        run: ./tests/test_all.sh

      - name: Run performance tests
        run: ./tests/perf_test.sh
        env:
          PERF_ITERATIONS: 50
